<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="PlanHabits — Track your weekly habits, build streaks, and reach your goals.">
    <title>PlanHabits</title>

    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css?v=16">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-spinner"></div>
        <p class="loading-text">Loading PlanHabits...</p>
    </div>

    <!-- App Container -->
    <div id="app" class="app" style="display: none;">
        <!-- Header -->
        <header id="app-header" class="app-header">
            <div class="header-left">
                <button id="btn-back" class="btn-icon hidden" aria-label="Go back">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 18l-6-6 6-6"/>
                    </svg>
                </button>
            </div>
            <div class="header-center">
                <h1 id="header-title" class="header-title">Today</h1>
                <p id="header-subtitle" class="header-subtitle"></p>
            </div>
            <div class="header-right">
                <button id="btn-settings" class="btn-icon" aria-label="Toggle theme">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Motivational Quote -->
        <div id="quote-banner" class="quote-banner">
            <p id="quote-text" class="quote-text"></p>
        </div>

        <!-- Day Picker Strip -->
        <div id="day-picker" class="day-picker">
            <div id="day-picker-strip" class="day-picker-strip"></div>
        </div>

        <!-- Screen Containers -->
        <main id="screen-container" class="screen-container">
            <!-- Today / Day View -->
            <section id="screen-today" class="screen active">
                <!-- Weekly Scope Progress -->
                <div id="weekly-goal-bar" class="weekly-goal-bar" style="display:none;">
                    <div class="goal-info">
                        <span class="goal-label">🎯 Weekly Scope</span>
                        <span id="goal-value" class="goal-value">0%</span>
                    </div>
                    <div class="goal-track">
                        <div id="goal-fill" class="goal-fill" style="width: 0%"></div>
                    </div>
                </div>

                <!-- Timeline -->
                <div id="timeline-container" class="timeline-container"></div>

                <!-- Habit Cards -->
                <div id="habits-list" class="habits-list"></div>

                <!-- Empty State -->
                <div id="empty-state" class="empty-state hidden">
                    <div class="empty-icon">📋</div>
                    <h3>No goals planned</h3>
                    <p>Go to the Week Planner to assign goals to this day</p>
                    <button class="btn-primary" id="btn-open-planner">Open Planner</button>
                </div>
            </section>

            <!-- Habits Management -->
            <section id="screen-habits" class="screen">
                <div id="habits-manage-list" class="habits-manage-list"></div>
            </section>

            <!-- FAB (outside screen section to avoid transition animations) -->
            <div class="fab-container" id="fab-container" style="display:none;">
                <div id="fab-dropdown" class="fab-dropdown hidden">
                    <button id="fab-add-category" class="fab-dropdown-item">
                        <span class="fab-dropdown-icon">📁</span>
                        <span>Add Category</span>
                    </button>
                    <button id="fab-add-habit" class="fab-dropdown-item">
                        <span class="fab-dropdown-icon">🎯</span>
                        <span>Add Goal</span>
                    </button>
                </div>
                <button id="btn-add-habit" class="btn-fab" aria-label="Add">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                </button>
            </div>

            <!-- Week Planner -->
            <section id="screen-planner" class="screen">
                <div id="planner-week-nav" class="planner-week-nav">
                    <button id="planner-prev" class="btn-nav-lg" aria-label="Previous week">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
                    </button>
                    <span id="planner-week-label" class="planner-week-label"></span>
                    <button id="planner-next" class="btn-nav-lg" aria-label="Next week">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
                    </button>
                </div>
                <div style="display:flex;justify-content:center;padding:0 var(--space-md) var(--space-md);">
                    <button id="planner-copy" class="btn-copy-lg" title="Copy from last week">📋 Copy Last Week</button>
                </div>
                <div id="planner-grid" class="planner-grid"></div>
            </section>

            <!-- Statistics -->
            <section id="screen-stats" class="screen">
                <div id="stats-week-nav" class="planner-week-nav">
                    <button id="stats-prev" class="btn-nav-lg" aria-label="Previous week">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
                    </button>
                    <span id="stats-week-label" class="planner-week-label"></span>
                    <button id="stats-next" class="btn-nav-lg" aria-label="Next week">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
                    </button>
                </div>
                <div id="stats-content" class="stats-content"></div>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav id="bottom-nav" class="bottom-nav">
            <button class="nav-item active" data-screen="today" id="nav-today">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
                <span>Today</span>
            </button>
            <button class="nav-item" data-screen="habits" id="nav-habits">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
                </svg>
                <span>Goals</span>
            </button>
            <button class="nav-item" data-screen="planner" id="nav-planner">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
                </svg>
                <span>Planner</span>
            </button>
            <button class="nav-item" data-screen="stats" id="nav-stats">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 20V10M12 20V4M6 20v-6"/>
                </svg>
                <span>Stats</span>
            </button>
        </nav>

        <!-- Modal Overlay -->
        <div id="modal-overlay" class="modal-overlay hidden">
            <div id="modal-content" class="modal-content"></div>
        </div>
    </div>

    <!-- Scripts — bundled (run webapp/build.sh to rebuild) -->
    <script src="dist/app.bundle.js?v=16"></script>

    <!-- Development: uncomment individual files, comment out bundle above
    <script src="js/api.js?v=12"></script>
    <script src="js/components/color-picker.js?v=12"></script>
    <script src="js/components/timeline.js?v=12"></script>
    <script src="js/components/habit-card.js?v=12"></script>
    <script src="js/components/charts.js?v=12"></script>
    <script src="js/components/heatmap.js?v=12"></script>
    <script src="js/screens/today.js?v=12"></script>
    <script src="js/screens/habits.js?v=12"></script>
    <script src="js/screens/planner.js?v=12"></script>
    <script src="js/screens/stats.js?v=12"></script>
    <script src="js/app.js?v=12"></script>
    -->
</body>
</html>
